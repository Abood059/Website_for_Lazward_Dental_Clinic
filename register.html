    rel="stylesheet" />
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">لازورد</a>
      <nav class="nav-links">
        <a href="why-lazord.html">لماذا لازورد</a>
        <a href="lab-services.html">خدمات المختبرات</a>
        <a href="solutions.html">الحلول</a>
        <a href="pricing.html">التسعير</a>
        <a href="learn.html">التعلم</a>
      </nav>
      <div class="nav-actions">
        <span class="phone">هاتف: +(970)0594866148</span>
        <a href="login.html" class="btn-login">تسجيل الدخول</a>
        <a href="register.html" class="btn-cta nav-active-login">سجل الآن</a>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="القائمة">
        <span></span><span></span><span></span>

    <div class="mobile-menu" id="mobileMenu">
      <a href="why-lazord.html">لماذا لازورد</a>

      <a href="register.html" class="btn-cta mobile-cta">سجل الآن</a>
    </div>
  </header>

  <main>
    <section class="login-section" style="padding: 4rem 1rem;">
      <div class="login-card" style="max-width: 600px;">
        <a href="index.html" class="logo login-logo">لازورد</a>
        <h1>تسجيل حساب جديد</h1>
        <p class="login-sub">أنشئ حساباً لعيادتك وانضم إلى منصتنا</p>

        <form class="login-form" id="registerForm">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label for="firstName">الاسم الأول</label>
              <input type="text" id="firstName" placeholder="محمد" required />
            </div>
            <div class="form-group">
              <label for="lastName">اسم العائلة</label>
              <input type="text" id="lastName" placeholder="أحمد" required />
            </div>
          </div>
          <div class="form-group">
            <label for="clinicName">اسم العيادة</label>
            <input type="text" id="clinicName" placeholder="عيادة الشفاء للأسنان" required />
          </div>
          <div class="form-group">
            <label for="phone">رقم الهاتف (اختياري)</label>
            <input type="text" id="phone" placeholder="+(970) 05..." />
          </div>
          <div class="form-group">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@email.com" required />
          </div>
          <div class="form-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
          <div class="form-group">
            <label for="passwordConfirm">تأكيد كلمة المرور</label>
            <input type="password" id="passwordConfirm" placeholder="••••••••" required />
          </div>
          <div id="registerError" style="color: red; margin-bottom: 1rem; font-size: 0.9rem;"></div>
          <button type="submit" class="btn-submit login-submit">إنشاء الحساب</button>
        </form>

        <p class="login-register">لديك حساب بالفعل؟ <a href="login.html" class="link-green">تسجيل الدخول</a></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="register.js"></script>
</body>

</html>
