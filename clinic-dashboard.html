<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة تحكم العيادة</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: #f4f7f6; font-family: 'Cairo', sans-serif; padding: 2rem; }
    .dashboard { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    th, td { padding: 1rem; text-align: right; border-bottom: 1px solid #eee; }
    th { background: #f9fbf9; color: var(--green-dark); }
    .btn-action { padding: 0.5rem 1rem; background: var(--green-mid); color: white; border-radius: 5px; text-decoration: none; font-size: 0.9rem; }
    .header-actions { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header-actions">
      <h1>طلبات العيادة</h1>
      <button onclick="logout()" class="btn-action" style="background: #e74c3c;">تسجيل الخروج</button>
    </div>
    
    <div style="margin-top: 1rem;">
      <h3>إنشاء طلب جديد</h3>
      <form id="newCaseForm" style="display: flex; gap: 1rem; align-items: center; margin-top: 1rem;">
        <select id="productSelect" required style="padding: 0.5rem; border-radius: 5px;"></select>
        <input type="text" id="caseNotes" placeholder="ملاحظات (اختياري)" style="padding: 0.5rem; border-radius: 5px; flex: 1;">
        <button type="submit" class="btn-action">إنشاء مسودة</button>
      </form>
    </div>

    <table id="casesTable">
      <thead>
        <tr>
          <th>رقم الطلب</th>
          <th>المنتج</th>
          <th>الحالة</th>
          <th>تاريخ الإنشاء</th>
          <th>الإجراءات</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data will be loaded here -->
      </tbody>
    </table>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    async function loadProducts() {
      const res = await fetch('/api/products');
      const data = await res.json();
      const select = document.getElementById('productSelect');
      if (data.data && data.data.products) {
        data.data.products.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p._id;
          opt.textContent = p.name;
          select.appendChild(opt);
        });
      }
    }

    async function loadCases() {
      const res = await fetch('/api/cases', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      const tbody = document.querySelector('#casesTable tbody');
      tbody.innerHTML = '';
      if (data.data && data.data.cases) {
        data.data.cases.forEach(c => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${c._id.slice(-6)}</td>
            <td>${c.productId?.name || 'غير محدد'}</td>
            <td>${c.status}</td>
            <td>${new Date(c.createdAt).toLocaleDateString('ar-EG')}</td>
            <td><a href="case-detail.html?id=${c._id}" class="btn-action">التفاصيل</a></td>
          `;
          tbody.appendChild(tr);
        });
      }
    }

    document.getElementById('newCaseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const productId = document.getElementById('productSelect').value;
      const notes = document.getElementById('caseNotes').value;

      const res = await fetch('/api/cases', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ productId, notes })
      });

      if (res.ok) {
        const data = await res.json();
        window.location.href = `case-detail.html?id=${data.data.caseOrder._id}`;
      } else {
        alert('حدث خطأ');
      }
    });

    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    loadProducts();
    loadCases();
  </script>
</body>
</html>
